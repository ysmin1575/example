<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>미리보기</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
white-space:pre-line;
}

button{
margin-top:30px;
background:#15803d;
color:white;
padding:12px 30px;
border:none;
border-radius:25px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>AI 슬라이드 미리보기</h2>

<p>{{result}}</p>

<form action="/generate" method="post">

<input type="hidden" name="title" value="{{title}}">
<input type="hidden" name="name" value="{{name}}">
<input type="hidden" name="result" value="{{result}}">

<button type="submit">
PPT 다운로드
</button>

</form>

</div>

</div>

</body>
</html>
