<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PPT 생성</title>

<style>

body{
font-family:Arial;
background:#f5f3ff;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:15px;
margin-top:10px;
margin-bottom:20px;
border-radius:10px;
border:1px solid #ddd;
}

textarea{
height:200px;
}

button{
background:#a855f7;
color:white;
padding:12px 30px;
border:none;
border-radius:25px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>PPT 정보 입력</h2>

<form action="/preview" method="post">

<label>발표 주제</label>
<input name="title" required>

<label>조사 내용</label>
<textarea name="content" required></textarea>

<label>학번 / 이름</label>
<input name="name" required>

<button type="submit">
미리보기 생성
</button>

</form>

</div>

</div>

</body>
</html>
