<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PPT 생성</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f4f6;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
}

input, textarea{

width:100%;
padding:15px;

border-radius:10px;
border:1px solid #ddd;

margin-top:10px;
margin-bottom:20px;

font-size:16px;
}

textarea{
height:200px;
resize:none;
}

button{

background:#15803d;
color:white;

padding:12px 30px;

border:none;
border-radius:25px;

cursor:pointer;
font-size:16px;
}

.steps{
display:flex;
align-items:center;
justify-content:center;
margin-bottom:30px;
}

.step{

width:35px;
height:35px;

border-radius:50%;

background:#15803d;
color:white;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;
}

.line{
width:80px;
height:3px;
background:#ddd;
}

</style>

</head>

<body>

<div class="container">

<div class="steps">

<div class="step">1</div>
<div class="line"></div>

<div class="step" style="background:#ddd;color:black;">2</div>
<div class="line"></div>

<div class="step" style="background:#ddd;color:black;">3</div>
<div class="line"></div>

<div class="step" style="background:#ddd;color:black;">4</div>

</div>

<div class="card">

<h2>PPT 자동 제작</h2>

<form action="/generate" method="post">

<label>발표 주제</label>
<input name="title" placeholder="예: 지구온난화">

<label>조사 내용</label>
<textarea name="content"
placeholder="조사한 내용을 붙여넣으세요"></textarea>

<label>학번 / 이름</label>
<input name="name" placeholder="예: 30101 홍길동">

<button type="submit">
PPT 생성
</button>

</form>

</div>

</div>

</body>
</html>
