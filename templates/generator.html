<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PPT 생성</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:12px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
}

button{
margin-top:20px;
padding:12px;
width:100%;
background:#7c3aed;
border:none;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
}

textarea{
height:200px;
}

</style>
</head>

<body>

<div class="container">

<h2>PPT 자동 생성</h2>

<form action="/generate" method="post">

<input name="title" placeholder="PPT 제목" required>

<input name="name" placeholder="작성자 이름" required>

<textarea name="content" placeholder="조사 내용을 줄마다 입력하세요" required></textarea>

<button type="submit">
PPT 생성
</button>

</form>

</div>

</body>
</html>
