<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PPT 생성</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input,textarea,select{
width:100%;
padding:15px;
margin-top:10px;
margin-bottom:20px;
border-radius:10px;
border:1px solid #ddd;
}

textarea{
height:200px;
}

button{
background:#15803d;
color:white;
padding:12px 30px;
border:none;
border-radius:25px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>PPT 자동 제작</h2>

<form action="/preview" method="post">

<label>발표 주제</label>
<input name="title">

<label>조사 내용</label>
<textarea name="content"></textarea>

<label>학번 / 이름</label>
<input name="name">

<label>PPT 스타일</label>
<select name="template">

<option>발표 스타일</option>
<option>보고서 스타일</option>
<option>학교 발표</option>

</select>

<button type="submit">
AI 미리보기 생성
</button>

</form>

</div>

</div>

</body>
</html>
