<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SLIDR</title>

<style>
:root{
--main:#7c3aed;
--bg:#0f172a;
}

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#0f172a,#111827);
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo{
font-weight:bold;
font-size:22px;
color:var(--main);
}

.menu{
display:flex;
gap:30px;
align-items:center;
}

.menu button{
background:var(--main);
border:none;
padding:10px 20px;
border-radius:20px;
color:white;
cursor:pointer;
}

.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:80px;
margin:0;
}

.hero span{
color:var(--main);
}

.btn-main{
margin-top:30px;
background:var(--main);
padding:15px 30px;
border:none;
border-radius:30px;
color:white;
cursor:pointer;
}

/* 업데이트 박스 */

.update-box{
width:100%;
display:flex;
justify-content:center;
margin-top:20px;
}

.update{
background:#1e293b;
padding:20px 40px;
border-radius:12px;
max-width:600px;
text-align:center;
}

.update h3{
margin-top:0;
color:#a78bfa;
}

/* 피드백 버튼 */

.feedback{
position:fixed;
bottom:25px;
right:25px;
}

.feedback button{
background:#7c3aed;
border:none;
padding:12px 18px;
border-radius:30px;
color:white;
cursor:pointer;
font-weight:bold;
}
</style>

</head>

<body>

<nav>

<div class="logo">Example</div>

<div class="menu">
<button onclick="location.href='/generator'">PPT 만들기</button>
</div>

</nav>

<div class="hero">

<h1>SLI<span>DR</span></h1>

<button class="btn-main" onclick="location.href='/generator'">
✨ PPT 바로 만들기
</button>

</div>
<div class="feedback">

<form action="/feedback" method="post">

<input 
type="text"
name="message"
placeholder="피드백을 입력하세요"
required
style="padding:10px;border-radius:20px;border:none;width:200px;"
>

<button type="submit">
💬 보내기
</button>

</form>

</div>
<div class="update-box">
<div class="update">
<h3>🚀 업데이트 예정</h3>
<p>AI가 조사 내용을 자동 요약하여 PPT 슬라이드를 생성하는 기능이 추가될 예정입니다.</p>
</div>
</div>

</body>
</html>
