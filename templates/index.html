<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SLIDR</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f1a;
color:white;
}

nav{
display:flex;
justify-content:space-between;
padding:20px 60px;
}

.logo{
font-size:26px;
font-weight:bold;
color:#a855f7;
}

.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:70px;
margin:0;
}

.hero span{
color:#a855f7;
}

.main-btn{
margin-top:30px;
padding:15px 40px;
background:#a855f7;
border:none;
border-radius:30px;
color:white;
font-size:18px;
cursor:pointer;
}

.feedback{
position:fixed;
bottom:20px;
right:20px;
}

.feedback input{
padding:10px;
border-radius:20px;
border:none;
}

.feedback button{
background:#a855f7;
border:none;
padding:10px 15px;
border-radius:20px;
color:white;
}

</style>
</head>

<body>

<nav>
<div class="logo">SLIDR</div>
</nav>

<div class="hero">

<h1>AI PPT <span>Generator</span></h1>
<p>몇 초 만에 발표 슬라이드를 만드세요</p>

<button class="main-btn"
onclick="location.href='/generator'">
PPT 만들기
</button>

</div>

<div class="feedback">

<form action="/feedback" method="post">

<input name="message" placeholder="피드백 보내기" required>
<button type="submit">전송</button>

</form>

</div>

</body>
</html>
