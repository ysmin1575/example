<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SLIDR</title>

<style>
:root{
--main:#7c3aed;
--bg:#0f172a;
}

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#0f172a,#111827);
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo{
font-weight:bold;
font-size:22px;
color:var(--main);
}

.menu{
display:flex;
gap:30px;
align-items:center;
}

.menu button{
background:var(--main);
border:none;
padding:10px 20px;
border-radius:20px;
color:white;
cursor:pointer;
}

.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:80px;
margin:0;
}

.hero span{
color:var(--main);
}

.btn-main{
margin-top:30px;
background:var(--main);
padding:15px 30px;
border:none;
border-radius:30px;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<nav>

<div class="logo">SLIDR</div>

<div class="menu">
<button onclick="location.href='/generator'">PPT 만들기</button>
</div>

</nav>

<div class="hero">

<h1>SLI<span>DR</span></h1>

<button class="btn-main" onclick="location.href='/generator'">
✨ PPT 바로 만들기
</button>

</div>

</body>
</html>
