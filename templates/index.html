<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SLIDR</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

nav{
display:flex;
justify-content:space-between;
padding:20px 60px;
}

.logo{
font-size:24px;
font-weight:bold;
color:#7c3aed;
}

.menu button{
background:#7c3aed;
border:none;
padding:10px 20px;
border-radius:20px;
color:white;
cursor:pointer;
}

.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:80px;
margin:0;
}

.hero span{
color:#7c3aed;
}

.btn-main{
margin-top:30px;
padding:15px 35px;
background:#7c3aed;
border:none;
border-radius:30px;
color:white;
font-size:18px;
cursor:pointer;
}

.feedback{
position:fixed;
bottom:25px;
right:25px;
}

.feedback input{
padding:10px;
border-radius:20px;
border:none;
}

.feedback button{
padding:10px 15px;
border:none;
background:#7c3aed;
color:white;
border-radius:20px;
cursor:pointer;
}

</style>

</head>

<body>

<nav>

<div class="logo">SLIDR</div>

<div class="menu">
<button onclick="location.href='/generator'">
PPT 만들기
</button>
</div>

</nav>

<div class="hero">

<h1>SLI<span>DR</span></h1>

<p>AI 기반 PPT 자동 생성 서비스</p>

<button class="btn-main"
onclick="location.href='/generator'">

✨ PPT 바로 만들기

</button>

</div>

<div class="feedback">

<form action="/feedback" method="post">

<input
type="text"
name="message"
placeholder="피드백"
required
>

<button type="submit">보내기</button>

</form>

</div>

</body>
</html>
