<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PPT 자동 생성기</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:12px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#38bdf8;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

textarea{
height:180px;
}

</style>

</head>

<body>

<div class="container">

<h2>PPT 자동 생성 사이트</h2>

<form action="/generate" method="post">

<input name="title" placeholder="PPT 제목" required>

<input name="name" placeholder="작성자 이름" required>

<textarea name="content" placeholder="조사 내용을 줄마다 입력하세요 (줄마다 슬라이드 생성)" required></textarea>

<button type="submit">PPT 생성</button>

</form>

</div>

</body>
</html>
